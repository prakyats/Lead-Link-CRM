services:
  postgres:
    image: postgres:16-alpine
    container_name: leadlink_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leadlink
    ports:
      - "5433:5432"
    volumes:
      - leadlink_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leadlink"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  leadlink_pgdata:
